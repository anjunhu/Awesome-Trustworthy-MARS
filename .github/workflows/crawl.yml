name: Daily crawler

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Crawl and save raw JSON
        env:
          OPENREVIEW_USERNAME: ${{ secrets.OPENREVIEW_USERNAME }}
          OPENREVIEW_PASSWORD: ${{ secrets.OPENREVIEW_PASSWORD }}
        run: python3 crawler.py --save-raw raw_crawl.json --no-commit

      - name: Commit and push to GitHub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md papers.json raw_crawl.json
          git diff --cached --quiet || git commit -m "docs: daily crawler update $(date -u +%Y-%m-%d)"
          git push origin main
